<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fly-in Output Visualizer</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #172033;
    }

    header {
      padding: 18px 24px;
      background: #172033;
      color: white;
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    header p {
      margin: 0;
      color: #cbd5e1;
    }

    .layout {
      display: grid;
      grid-template-columns: 410px 1fr;
      gap: 16px;
      padding: 16px;
      min-height: calc(100vh - 76px);
    }

    .panel {
      background: white;
      border: 1px solid #d9e2ef;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    label {
      display: block;
      font-weight: bold;
      margin: 10px 0 6px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px;
      font-family: Consolas, monospace;
      font-size: 13px;
      background: #fbfdff;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      margin: 10px 6px 0 0;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-weight: bold;
    }

    button.secondary {
      background: #475569;
    }

    button.danger {
      background: #dc2626;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .stat {
      background: #eef4ff;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      border: 1px solid #d8e6ff;
    }

    .stat strong {
      display: block;
      font-size: 22px;
      color: #1d4ed8;
    }

    .viewer {
      height: 72vh;
      min-height: 480px;
      border: 1px solid #d9e2ef;
      border-radius: 14px;
      background: #ffffff;
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    .edge {
      stroke: #94a3b8;
      stroke-width: 3;
    }

    .node {
      stroke: #172033;
      stroke-width: 2;
    }

    .node-label {
      font-size: 13px;
      font-weight: bold;
      fill: #172033;
    }

    .drone {
      stroke: white;
      stroke-width: 2;
    }

    .drone-label {
      font-size: 12px;
      font-weight: bold;
      fill: white;
      pointer-events: none;
    }

    .turn-box {
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      font-family: Consolas, monospace;
      min-height: 46px;
    }

    .error {
      color: #dc2626;
      font-weight: bold;
      margin-top: 10px;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .viewer {
        height: 520px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Fly-in Drone Output Visualizer</h1>
    <p>Paste your map and your terminal output. Then click Visualize.</p>
  </header>

  <main class="layout">
    <section class="panel">
      <label for="mapInput">Map file</label>
      <textarea id="mapInput">nb_drones: 3
start_hub: start 0 0 [color=green]
end_hub: goal 10 0 [color=gold]
hub: a 3 2 [color=red]
hub: b 3 -2 [color=blue]
hub: c 7 2 [color=purple]
hub: d 7 -2 [color=orange]
connection: start-a
connection: start-b
connection: a-c
connection: b-d
connection: c-goal
connection: d-goal</textarea>

      <label for="outputInput">Simulation output</label>
      <textarea id="outputInput">D1-a D2-b
D1-c D2-d D3-a
D1-goal D2-goal D3-c
D3-goal</textarea>

      <button onclick="loadVisualization()">Visualize</button>
      <button class="secondary" onclick="previousTurn()">Previous</button>
      <button class="secondary" onclick="nextTurn()">Next</button>
      <button class="secondary" onclick="playTurns()">Play</button>
      <button class="danger" onclick="stopPlay()">Stop</button>

      <div id="error" class="error"></div>
    </section>

    <section class="panel">
      <div class="stats">
        <div class="stat"><strong id="turnNumber">0</strong>Turn</div>
        <div class="stat"><strong id="totalTurns">0</strong>Total turns</div>
        <div class="stat"><strong id="delivered">0</strong>Delivered</div>
      </div>

      <div class="viewer">
        <svg id="svg" viewBox="0 0 900 560"></svg>
      </div>

      <div class="turn-box" id="turnText">Click Visualize.</div>
    </section>
  </main>

  <script>
    let zones = {};
    let connections = [];
    let states = [];
    let turns = [];
    let currentTurn = 0;
    let timer = null;
    let startName = "";
    let endName = "";
    let droneCount = 0;

    function parseMetadata(text) {
      const metadata = {};
      const match = text.match(/\[(.*)\]/);
      if (!match) return metadata;

      match[1].trim().split(/\s+/).forEach(part => {
        const [key, value] = part.split("=");
        if (key && value) metadata[key] = value;
      });

      return metadata;
    }

    function parseMap(text) {
      zones = {};
      connections = [];
      startName = "";
      endName = "";
      droneCount = 0;

      const lines = text.split("\n").map(line => line.trim()).filter(line => line && !line.startsWith("#"));

      lines.forEach(line => {
        if (/^nb_drones *:/.test(line)) {
          droneCount = Number(line.split(":")[1].trim());
          return;
        }

        if (/^(start_hub|end_hub|hub) *:/.test(line)) {
          const type = line.split(":")[0].trim();
          const clean = line.slice(line.indexOf(":") + 1).split("[")[0].trim();
          const parts = clean.split(/\s+/);
          const name = parts[0];
          const x = Number(parts[1]);
          const y = Number(parts[2]);
          const metadata = parseMetadata(line);

          zones[name] = {
            name,
            x,
            y,
            color: metadata.color || (type === "start_hub" ? "green" : type === "end_hub" ? "gold" : "#e2e8f0"),
            type
          };

          if (type === "start_hub") startName = name;
          if (type === "end_hub") endName = name;
          return;
        }

        if (/^connection *:/.test(line)) {
          const clean = line.slice(line.indexOf(":") + 1).split("[")[0].trim();
          const [from, to] = clean.split("-");
          if (zones[from] && zones[to]) connections.push({ from, to, name: `${from}-${to}` });
        }
      });

      if (!droneCount || !startName || !endName) {
        throw new Error("Map must have nb_drones, start_hub, and end_hub.");
      }
    }

    function parseOutput(text) {
      turns = text.split("\n").map(line => line.trim()).filter(Boolean);
      states = [];

      let state = {};
      for (let id = 1; id <= droneCount; id++) {
        state[`D${id}`] = startName;
      }
      states.push({ ...state });

      turns.forEach(line => {
        line.split(/\s+/).forEach(move => {
          const match = move.match(/^(D\d+)-(.+)$/);
          if (!match) return;

          const droneId = match[1];
          const target = match[2];
          state[droneId] = target;
        });

        states.push({ ...state });
      });
    }

    function positionForTarget(target) {
      if (zones[target]) return zones[target];

      if (target.includes("-")) {
        const [a, b] = target.split("-");
        if (zones[a] && zones[b]) {
          return {
            x: (zones[a].x + zones[b].x) / 2,
            y: (zones[a].y + zones[b].y) / 2,
            name: target
          };
        }
      }

      return zones[startName];
    }

    function makeScaler() {
      const values = Object.values(zones);
      const minX = Math.min(...values.map(z => z.x));
      const maxX = Math.max(...values.map(z => z.x));
      const minY = Math.min(...values.map(z => z.y));
      const maxY = Math.max(...values.map(z => z.y));
      const pad = 80;

      return function scale(point) {
        const xRange = maxX - minX || 1;
        const yRange = maxY - minY || 1;

        return {
          x: pad + ((point.x - minX) / xRange) * (900 - pad * 2),
          y: 560 - (pad + ((point.y - minY) / yRange) * (560 - pad * 2))
        };
      };
    }

    function draw() {
      const svg = document.getElementById("svg");
      svg.innerHTML = "";
      const scale = makeScaler();
      const state = states[currentTurn] || {};

      connections.forEach(edge => {
        const a = scale(zones[edge.from]);
        const b = scale(zones[edge.to]);
        svg.innerHTML += `<line class="edge" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" />`;
      });

      Object.values(zones).forEach(zone => {
        const p = scale(zone);
        svg.innerHTML += `
          <circle class="node" cx="${p.x}" cy="${p.y}" r="24" fill="${zone.color}" />
          <text class="node-label" x="${p.x}" y="${p.y + 42}" text-anchor="middle">${zone.name}</text>
        `;
      });

      const dronesAtSamePlace = {};
      Object.entries(state).forEach(([droneId, target]) => {
        if (target === endName && currentTurn > 0) return;

        const key = target;
        dronesAtSamePlace[key] = dronesAtSamePlace[key] || [];
        dronesAtSamePlace[key].push(droneId);
      });

      Object.entries(state).forEach(([droneId, target]) => {
        if (target === endName && currentTurn > 0) return;

        const base = scale(positionForTarget(target));
        const group = dronesAtSamePlace[target] || [];
        const index = group.indexOf(droneId);
        const angle = (Math.PI * 2 * index) / Math.max(group.length, 1);
        const offset = group.length > 1 ? 18 : 0;
        const x = base.x + Math.cos(angle) * offset;
        const y = base.y + Math.sin(angle) * offset;

        svg.innerHTML += `
          <circle class="drone" cx="${x}" cy="${y}" r="15" fill="#0f172a" />
          <text class="drone-label" x="${x}" y="${y + 4}" text-anchor="middle">${droneId.replace("D", "")}</text>
        `;
      });

      const delivered = Object.values(state).filter(place => place === endName).length;
      document.getElementById("turnNumber").textContent = currentTurn;
      document.getElementById("totalTurns").textContent = turns.length;
      document.getElementById("delivered").textContent = delivered;
      document.getElementById("turnText").textContent = currentTurn === 0 ? "Start position" : turns[currentTurn - 1];
    }

    function loadVisualization() {
      try {
        document.getElementById("error").textContent = "";
        parseMap(document.getElementById("mapInput").value);
        parseOutput(document.getElementById("outputInput").value);
        currentTurn = 0;
        draw();
      } catch (error) {
        document.getElementById("error").textContent = error.message;
      }
    }

    function nextTurn() {
      if (currentTurn < states.length - 1) {
        currentTurn++;
        draw();
      }
    }

    function previousTurn() {
      if (currentTurn > 0) {
        currentTurn--;
        draw();
      }
    }

    function playTurns() {
      stopPlay();
      timer = setInterval(() => {
        if (currentTurn >= states.length - 1) {
          stopPlay();
          return;
        }
        nextTurn();
      }, 900);
    }

    function stopPlay() {
      if (timer) clearInterval(timer);
      timer = null;
    }

    loadVisualization();
  </script>
</body>
</html>
